<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> FitLife AI - Giriş Yap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,400&family=DM+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --lime: #ae4c02f0;
            --cream: #f5f0e8;
            --dark: #0e1a10;
            --green: #1a6b3a;
            --green-light: #2d9e57;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Arka plan efektleri */
        .bg-orb-1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(45, 158, 87, 0.15), transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: drift 8s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-orb-2 {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(181, 229, 80, 0.08), transparent 70%);
            border-radius: 50%;
            bottom: -80px;
            right: -80px;
            animation: drift 10s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, 20px);
            }
        }

        .auth-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 32px;
            padding: 48px 40px 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.07);
            animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            font-size: 48px;
            display: block;
            margin-bottom: 14px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .auth-header h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--cream);
            margin-bottom: 10px;
        }

        .auth-header h1 span {
            color: var(--lime);
        }

        .auth-header p {
            font-size: 0.9rem;
            opacity: 0.45;
            font-weight: 300;
        }

        /* Form — her zaman dikey! */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .input-wrap {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.35;
            pointer-events: none;
        }

        .auth-form input {
            width: 100%;
            display: block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 15px 18px 15px 46px;
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }

        .auth-form input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .auth-form input:focus {
            border-color: rgb(245, 238, 46);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(181, 229, 80, 0.07);
        }

        .btn-submit {
            width: 100%;
            display: block;
            background: linear-gradient(135deg, var(--green), var(--green-light));
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(45, 158, 87, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-text {
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.5;
            margin-top: 4px;
        }

        .toggle-text a {
            color: var(--lime);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        /* Bildirim */
        .notif {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .notif.show {
            transform: translateX(-50%) translateY(0);
        }

        .notif.success {
            background: rgba(45, 158, 87, 0.95);
            color: white;
        }

        .notif.error {
            background: rgba(220, 60, 60, 0.95);
            color: white;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 36px 24px 32px;
                border-radius: 24px;
            }

            .auth-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="auth-header">
                <span class="auth-logo"></span>
                <h1>Fit<span>Life AI</span></h1>
                <p id="auth-subtitle">Yolculuğuna devam et</p>
            </div>

            <!-- GİRİŞ FORMU -->
            <form id="login-form" class="auth-form">
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="login-username" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login-password" placeholder="Şifre" required>
                </div>
                <button type="submit" class="btn-submit">Giriş Yap →</button>
                <p class="toggle-text">
                    Hesabın yok mu?
                    <a href="#" onclick="toggleAuth(); return false;">Kayıt Ol 🥑</a>
                </p>
            </form>

            <!-- KAYIT FORMU -->
            <form id="register-form" class="auth-form" style="display:none;">
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="reg-username" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input type="email" id="reg-email" placeholder="E-posta Adresi" required>
                </div>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="reg-password" placeholder="Şifre (min. 6 karakter)" required>
                </div>
                <button type="submit" class="btn-submit">Hemen Katıl </button>
                <p class="toggle-text">
                    Zaten üye misin?
                    <a href="#" onclick="toggleAuth(); return false;">Giriş Yap</a>
                </p>
            </form>

        </div>
    </div>

    <div class="notif" id="notif"></div>

    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script>
        // Bildirim fonksiyonunu override et
        function showNotification(message, isError = false) {
            const n = document.getElementById('notif');
            n.textContent = message;
            n.className = 'notif ' + (isError ? 'error' : 'success');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3200);
        }
    </script>
</body>

</html>
